<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>✨ FaceBox Login ✨</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/12795/12795734.png">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 0;
    font-family: 'Poppins', Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .login-box {
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 0 30px rgba(59,130,246,0.4);
    width: 90%;
    max-width: 400px;
    animation: fadeIn 0.7s ease;
  }

  .login-box h2 {
    text-align: center;
    font-weight: 700;
    color: #fff;
    margin-bottom: 25px;
    text-shadow: 0 0 10px #3b82f6, 0 0 25px #60a5fa;
  }

  .form-control {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
  }

  .form-control:focus {
    box-shadow: 0 0 10px #60a5fa;
    background: rgba(255,255,255,0.25);
    color: #fff;
  }

  label {
    font-weight: 500;
  }

  .btn-login {
    background: linear-gradient(90deg, #2563eb, #60a5fa);
    border: none;
    width: 100%;
    padding: 12px;
    border-radius: 30px;
    color: white;
    font-size: 1.1em;
    font-weight: 600;
    transition: 0.3s;
    box-shadow: 0 0 15px rgba(96,165,250,0.5);
  }

  .btn-login:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 25px rgba(96,165,250,0.9);
  }

  .logo {
    display: block;
    margin: 0 auto 15px auto;
    width: 70px;
    filter: drop-shadow(0 0 10px #3b82f6);
  }

  .text-center a {
    color: #93c5fd;
    text-decoration: none;
  }

  .text-center a:hover {
    text-decoration: underline;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<body>
  <div class="login-box">
    <img class="logo" src="https://cdn-icons-png.flaticon.com/512/12795/12795734.png" alt="FaceBox Logo">
    <h2>FaceBox Giriş</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username_text" class="form-label">Kullanıcı Adı</label>
        <input id="username_text" type="text" class="form-control" placeholder="Kullanıcı adınızı girin" required>
      </div>

      <div class="mb-3">
        <label for="password_text" class="form-label">Şifre</label>
        <input id="password_text" type="password" class="form-control" placeholder="Şifrenizi girin" required>
      </div>

      <!-- <div class="form-check mb-3">
        <input  type="checkbox" class="form-check-input" id="rememberMe">
        <label class="form-check-label" for="rememberMe">Beni Hatırla</label>
      </div> -->

      <button id="login_btn" type="submit" class="btn-login">🔐 Giriş Yap</button>

   
    </form>
  </div>

<script src="login.js">
 
</script>
</body>
</html>
